<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="App.css" />
    <title>ShopCore</title>
  </head>
  <body>
    <div class="app-layout">
      <nav>
        <div class="logo">
          <a href="#/">
            <img
              src="Green ShopCore logo design.png"
              alt="ShopCore"
              height="100"
              width="150"
            />
          </a>
        </div>
        <div class="nav-links">
          <a href="#/sunglass">Sunglasses</a>
          <a href="#/shirts">Shirts</a>
          <a href="#/shoes">Shoes</a>
          <a href="#/watches">Watches</a>

          <a href="#/cart" class="cart-link">
            <i class="bi bi-cart"></i>
            <span class="cart-badge" id="cartBadge">1</span>
          </a>
        </div>
      </nav>
      <div class="stock-alert" id="stock-alert">
        <p class="alert-msg" id="stock-excd-msg" role="alert"></p>
      </div>

      <div class="content" id="main-content"></div>

      <div class="modal quick-add-modal" tabindex="-1" id="quick-cart-modal">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h2 class="modal-title">Luxury Watch</h2>
            </div>

            <div class="modal-body">
              <div class="product-meta">
                <p class="price">$10,000</p>

                <div class="modal-stock"></div>

                <div class="qty-section">
                  <label class="qty-label">Quantity</label>

                  <div class="cart-qty">
                    <button
                      class="qty-btn"
                      type="button"
                      data-action="decrement"
                    >
                      <i class="bi bi-dash"></i>
                    </button>

                    <span class="qty-value">1</span>

                    <button
                      class="qty-btn"
                      type="button"
                      data-action="increment"
                    >
                      <i class="bi bi-plus"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button class="cart-btn" type="button" id="quickAddToCartBtn">
                Add to Cart
              </button>
            </div>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        <div class="footer-inner">
          <p>© 2026 ShopCore</p>

          <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Support</a>
            <a href="#">Contact</a>
          </div>
        </div>
      </footer>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-player/2.0.12/lottie-player.js"></script>

  <script src="App.js"></script>
</html>
